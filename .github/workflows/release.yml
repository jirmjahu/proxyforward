name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version=$(sed -n 's/.*mod\.version *= *"\(.*\)"/\1/p' stonecutter.properties.toml)
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Check release
        id: check
        shell: bash
        run: |
          set -euo pipefail

          if git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.value }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.check.outputs.exists == 'false'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - if: steps.check.outputs.exists == 'false'
        uses: gradle/actions/setup-gradle@v4

      - if: steps.check.outputs.exists == 'false'
        run: ./gradlew buildAndCollect --no-daemon

      - if: steps.check.outputs.exists == 'false'
        shell: bash
        run: |
          set -euo pipefail

          mkdir dist

          find "build/libs/${{ steps.version.outputs.value }}" \
            -name '*.jar' \
            ! -name '*sources*' \
            ! -name '*dev*' \
            -exec cp {} dist/ \;

      - if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: v${{ steps.version.outputs.value }}
          files: dist/*.jar
          generate_release_notes: true